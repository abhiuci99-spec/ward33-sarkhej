<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>વોર્ડ ૩૩ સરખેજ — મતદાન મથક શોધો</title>
<style>
  :root {
    --saffron: #FF6B00;
    --saffron2: #FF9040;
    --dark: #0a0c12;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --green: #16a34a;
    --bg: #f4f1eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    min-height:100vh;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
  }

  /* ── HEADER ── */
  .header {
    background: var(--dark);
    padding: 18px 20px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
  }
  .header-badge {
    display: inline-block;
    background: var(--saffron);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    line-height: 1.3;
  }
  .header h1 span { color: var(--saffron); }
  .header p {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 4px;
  }

  /* ── SEARCH BOX ── */
  .search-wrap {
    padding: 20px 16px 12px;
    background: var(--dark);
    border-bottom: 1px solid #1f2937;
  }
  .search-label {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
  }
  .search-box {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--saffron);
  }
  #searchInput {
    width: 100%;
    padding: 13px 13px 13px 40px;
    border: 1.5px solid #374151;
    border-radius: 10px;
    font-size: 15px;
    background: #111827;
    color: #fff;
    outline: none;
    transition: border .2s;
  }
  #searchInput::placeholder { color: #4b5563; }
  #searchInput:focus { border-color: var(--saffron); }

  /* ── DROPDOWN ── */
  #dropdown {
    position: absolute;
    left: 16px;
    right: 16px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 10px;
    max-height: 280px;
    overflow-y: auto;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    display: none;
  }
  .dd-item {
    padding: 11px 14px;
    cursor: pointer;
    border-bottom: 1px solid #374151;
    transition: background .1s;
  }
  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active { background: #374151; }
  .dd-name { font-size: 13px; color: #f9fafb; font-weight: 500; }
  .dd-sub  { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .dd-empty { padding: 16px; text-align: center; color: #6b7280; font-size: 13px; }
  .dd-count { padding: 8px 14px; font-size: 10px; color: #6b7280; border-bottom: 1px solid #374151; font-weight: 600; letter-spacing: .5px; }

  /* ── RESULT CARD ── */
  .page { padding: 16px; }
  #resultCard { display: none; }
  #placeholder {
    text-align: center;
    padding: 50px 24px;
    color: var(--muted);
  }
  #placeholder .icon { font-size: 52px; margin-bottom: 12px; }
  #placeholder h3 { font-size: 16px; color: #374151; font-weight: 600; margin-bottom: 6px; }
  #placeholder p  { font-size: 13px; line-height: 1.6; }

  .result-header {
    border-radius: 12px 12px 0 0;
    padding: 18px 18px 16px;
    color: #fff;
    margin-bottom: 0;
  }
  .result-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .7;
    margin-bottom: 4px;
  }
  .result-soc-name {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .result-booth {
    font-size: 12px;
    opacity: .7;
  }

  .result-body {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    margin-bottom: 16px;
  }

  .info-row {
    display: flex;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .info-row:last-child { border-bottom: none; }
  .info-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .info-content {}
  .info-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
  .info-value { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .info-value.sk-name { font-size: 16px; font-weight: 700; }
  .info-en { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── ACTION BUTTONS ── */
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 18px;
    background: #f9fafb;
    border-top: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 13px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
    transition: transform .1s, opacity .1s;
  }
  .btn:active { transform: scale(.97); opacity: .9; }
  .btn-map {
    background: var(--dark);
    color: #fff;
  }
  .btn-call {
    background: var(--green);
    color: #fff;
  }

  /* ── HELPLINE CARD ── */
  .helpline-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .helpline-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--saffron), #ff4500);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .helpline-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
  .helpline-num { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: .5px; }
  .helpline-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 20px 16px 30px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.7;
  }
  .footer strong { color: var(--saffron); }

  /* ── SCROLLBAR ── */
  #dropdown::-webkit-scrollbar { width: 3px; }
  #dropdown::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }

  /* highlight match */
  .hl { background: rgba(255,107,0,.25); border-radius: 2px; padding: 0 1px; }
</style>

const HELPLINE  = ''; // Replace with actual number

const inp  = document.getElementById('searchInput');
const dd   = document.getElementById('dropdown');
const res  = document.getElementById('resultCard');
const placeholderEl = document.getElementById('placeholder');

let ddActive = -1;

function norm(s) {
  return s.toLowerCase().replace(/[^a-z0-9\u0A80-\u0AFF]/gi,' ').replace(/\s+/g,' ').trim();
}

function hl(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<span class="hl">$1</span>');
}

function search(q) {
  if (!q || q.length < 2) { dd.style.display='none'; return; }
  const nq = norm(q);
  const results = SOCIETIES.filter(s => norm(s.name).includes(nq) || norm(s.full).includes(nq)).slice(0,12);
  if (!results.length) {
    dd.innerHTML = '<div class="dd-empty">કોઈ સોસાયટી મળી નથી</div>';
    dd.style.display='block'; return;
  }
  dd.innerHTML = '<div class="dd-count">' + results.length + ' results</div>' +
    results.map((s,i) => {
      const sk = SK_META[s.sk];
      return '<div class="dd-item" data-idx="' + SOCIETIES.indexOf(s) + '">' +
        '<div class="dd-name">' + hl(s.name, q) + '</div>' +
        '<div class="dd-sub">Booth ' + s.booth + ' · ' + (sk ? sk.en : s.sk) + '</div></div>';
    }).join('');
  dd.style.display='block';
  ddActive = -1;
  dd.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('click', () => selectSociety(parseInt(el.dataset.idx)));
  });
}

inp.addEventListener('input', e => search(e.target.value));
inp.addEventListener('keydown', e => {
  const items = dd.querySelectorAll('.dd-item');
  if (e.key==='ArrowDown') { ddActive=Math.min(ddActive+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('active',i===ddActive)); e.preventDefault(); }
  else if (e.key==='ArrowUp') { ddActive=Math.max(ddActive-1,0); items.forEach((el,i)=>el.classList.toggle('active',i===ddActive)); e.preventDefault(); }
  else if (e.key==='Enter' && ddActive>=0) { const el=items[ddActive]; if(el) { selectSociety(parseInt(el.dataset.idx)); } }
  else if (e.key==='Escape') { dd.style.display='none'; }
});
document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) dd.style.display='none'; });

  if(mapBtn) mapBtn.addEventListener('click', function(){
    if(window.goatcounter) window.goatcounter.count({path: 'map-click/' + s.sk, title: 'Map: ' + s.name, event: true});
  });
  if(callBtn) callBtn.addEventListener('click', function(){
    if(window.goatcounter) window.goatcounter.count({path: 'call-click/' + s.sk, title: 'Call: ' + s.name, event: true});
  });
}
</script>
</body>
